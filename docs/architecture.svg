<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" role="img" aria-label="tsumeshogiのアーキテクチャ図">
  <title>tsumeshogiのアーキテクチャ: 入力からUI、詰将棋エンジン、問題と状態データまでの流れ</title>
  <style>
    .box { fill: #f8f4ec; stroke: #e2dac9; stroke-width: 1; }
    .zone { fill: none; stroke: #e2dac9; stroke-width: 1; }
    .t { font-family: 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif; fill: #211d15; }
    .h { font-size: 13px; font-weight: 600; }
    .s { font-size: 11px; fill: #635c4b; }
    .zl { font-size: 11px; font-weight: 700; fill: #9a6312; letter-spacing: 2px; }
    .arrow { stroke: #b6ad99; stroke-width: 1.4; fill: none; marker-end: url(#head); }
    .mono { font-family: 'SFMono-Regular', Consolas, monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #1f1c14; stroke: #2b271d; }
      .zone { stroke: #2b271d; }
      .t { fill: #e9e3d4; }
      .s { fill: #a09781; }
      .zl { fill: #d2a154; }
      .arrow { stroke: #5a5343; }
      #head path { fill: #5a5343; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#b6ad99" />
    </marker>
  </defs>

  <rect class="zone" x="20" y="20" width="780" height="88" rx="10" />
  <text class="t zl" x="38" y="44">入力</text>
  <rect class="box" x="38" y="54" width="368" height="48" rx="7" />
  <text class="t h" x="54" y="77">盤クリック / 矢印キー / 持ち駒選択</text>
  <text class="t s" x="54" y="93">動かす駒と行き先を指定する</text>
  <rect class="box" x="430" y="54" width="352" height="48" rx="7" />
  <text class="t h" x="446" y="77">ヒント / 待った / 解答</text>
  <text class="t s" x="446" y="93">詰み筋を示す・一手戻す・自動で再生する</text>

  <path class="arrow" d="M410 108 V134" />

  <rect class="zone" x="20" y="136" width="780" height="108" rx="10" />
  <text class="t zl mono" x="38" y="160">UI (src/main.ts)</text>
  <rect class="box" x="38" y="170" width="358" height="64" rx="7" />
  <text class="t h" x="54" y="194">SVG盤の描画</text>
  <text class="t s" x="54" y="212">盤・駒・持ち駒・利き先をベクターで描く</text>
  <rect class="box" x="414" y="170" width="368" height="64" rx="7" />
  <text class="t h" x="430" y="194">トレーナー進行</text>
  <text class="t s" x="430" y="212">指し手の正否を判定し、相手の応手を自動で指す</text>

  <path class="arrow" d="M300 244 V278" />
  <text class="t s" x="308" y="266">手の正否・詰み探索</text>
  <path class="arrow" d="M520 278 V244" />
  <text class="t s" x="512" y="266" text-anchor="end">最善応手</text>

  <rect class="zone" x="20" y="280" width="780" height="94" rx="10" />
  <text class="t zl" x="38" y="304">詰将棋エンジン</text>
  <rect class="box" x="38" y="312" width="358" height="52" rx="7" />
  <text class="t h mono" x="54" y="334">shogi.ts</text>
  <text class="t s" x="54" y="352">合法手・王手・打ち歩詰め・詰み判定</text>
  <rect class="box" x="414" y="312" width="368" height="52" rx="7" />
  <text class="t h mono" x="430" y="334">solve.ts</text>
  <text class="t s" x="430" y="352">AND-OR探索で詰みの有無と最善応手</text>

  <path class="arrow" d="M410 374 V404" />
  <text class="t s" x="418" y="394">参照</text>

  <rect class="zone" x="20" y="406" width="780" height="76" rx="10" />
  <text class="t zl mono" x="38" y="428">データ・状態 (src/lib)</text>
  <rect class="box" x="38" y="436" width="240" height="38" rx="7" />
  <text class="t h mono" x="54" y="459">problems.ts</text>
  <rect class="box" x="290" y="436" width="240" height="38" rx="7" />
  <text class="t h mono" x="306" y="459">progress.ts</text>
  <rect class="box" x="542" y="436" width="240" height="38" rx="7" />
  <text class="t h mono" x="558" y="459">types.ts</text>

  <text class="t s" x="410" y="504" text-anchor="middle">
    全問題はテストが「ちょうどその手数で詰む」ことを検証している
  </text>
</svg>
